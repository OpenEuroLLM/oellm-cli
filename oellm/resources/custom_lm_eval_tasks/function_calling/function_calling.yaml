task: function_calling
dataset_path: gorilla-llm/gorilla-openfunctions-v2
training_split: null
validation_split: null
test_split: test
doc_to_text: !function doc_to_text
doc_to_target: !function doc_to_target
process_results: !function process_results
output_type: generate_until
generation_kwargs:
  until:
    - "\n\n"
    - "\n"
    - "<|endoftext|>"
    - "<|im_end|>"
    - "<|eot_id|>"
  max_gen_toks: 256
metric_list:
  - metric: function_name_acc
    aggregation: mean
    higher_is_better: true
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
